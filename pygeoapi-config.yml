server:
  bind:
    host: 127.0.0.1
    port: 5000
  url: http://127.0.0.1:8000/ogcapi
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
    # First language is the default language
    - en-US
    - fr-CA
  # cors: true
  pretty_print: true
  limits:
    default_items: 20
    max_items: 50
  # templates:
  # path: /path/to/Jinja2/templates
  # static: /path/to/static/folder # css/js/img
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  manager:
    name: TinyDB
    connection: /tmp/pygeoapi-process-manager.db
    output_dir: /tmp/
  # ogc_schemas_location: /opt/schemas.opengis.net
  admin: false # enable admin api

logging:
  level: ERROR
  #logfile: /tmp/pygeoapi.log

metadata:
  identification:
    title:
      en: DHIS2 EO API
    description:
      en: OGC API compliant geospatial data API
    keywords:
      en:
        - geospatial
        - data
        - api
    keywords_type: theme
    terms_of_service: https://creativecommons.org/licenses/by/4.0/
    url: https://example.org
  license:
    name: CC-BY 4.0 license
    url: https://creativecommons.org/licenses/by/4.0/
  provider:
    name: DHIS2 EO API
    url: https://dhis2.org
  contact:
    name: DHIS2 Climate Team
    email: climate@dhis2.org
    role: pointOfContact

resources:
  dhis2-org-units:
    type: collection
    title: DHIS2 organization units
    description: Get organization units from DHIS2
    keywords:
      - dhis2
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: eo_api.routers.ogcapi.plugins.providers.dhis2_org_units.DHIS2OrgUnitsProvider
        data: tests/data/
        id_field: id

  dhis2-org-units-cql:
    type: collection
    title: DHIS2 organization units (CQL)
    description: Get organization units from DHIS2 with CQL filter support
    keywords:
      - dhis2
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: eo_api.routers.ogcapi.plugins.providers.dhis2_org_units_cql.DHIS2OrgUnitsCqlProvider
        data: tests/data/
        id_field: id

  sierra-leone-districts:
    type: collection
    title:
      en: District in Sierra Leone
    description:
      en: Districts of Sierra Leone
    keywords:
      en:
        - districts
        - sierra leone
    extents:
      spatial:
        bbox: [-13.3035, 6.9176, -10.2658, 10.0004]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: GeoJSON
        data: tests/data/sierra_leone_districts.geojson
        id_field: id
        title_field: name

  generic-chirps3-source:
    type: collection
    title: Generic CHIRPS3 source collection
    description: Generic workflow namespaced source collection for CHIRPS3 data access
    keywords:
      - generic-workflow
      - chirps3
      - precipitation
    extents:
      spatial:
        bbox: [-180, -60, 180, 60]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    links:
      - type: text/html
        rel: canonical
        title: information
        href: https://www.chc.ucsb.edu/data/chirps3
        hreflang: en-EN
    providers:
      - type: edr
        name: eo_api.routers.ogcapi.plugins.providers.dhis2eo.DHIS2EOProvider
        data: tests/data/

  era5-land:
    type: collection
    title: ERA5-Land hourly
    description: ERA5-Land hourly data on single levels from 1981 to present
    keywords:
      - era5
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    links:
      - type: text/html
        rel: canonical
        title: information
        href: https://cds.climate.copernicus.eu/datasets/reanalysis-era5-land
        hreflang: en-EN
    providers:
      - type: edr
        name: eo_api.routers.ogcapi.plugins.providers.dhis2eo.DHIS2EOProvider
        data: tests/data/

  generic-worldpop-source:
    type: collection
    title: Generic WorldPop source collection
    description: Generic workflow namespaced source collection for WorldPop data access
    keywords:
      - generic-workflow
      - worldpop
      - population
    extents:
      spatial:
        bbox: [-13.3035, 6.9176, -10.2658, 10.0004]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    links:
      - type: text/html
        rel: canonical
        title: information
        href: https://hub.worldpop.org/geodata/summary?id=75360
        hreflang: en-EN
    providers:
      - type: coverage
        name: rasterio
        data: tests/data/sle_pop_2026_CN_1km_R2025A_UA_v1.tif
        format:
          name: GeoTIFF
          mimetype: image/tiff
      - type: tile
        name: eo_api.routers.ogcapi.plugins.providers.titiler.TiTilerProvider
        data: tests/data/sle_pop_2026_CN_1km_R2025A_UA_v1.tif
        format:
          name: png
          mimetype: image/png
        options:
          scheme: WebMercatorQuad
          endpoint_base: http://127.0.0.1:8000
          endpoint: /cog/tiles
          timeout: 30
          colormap_name: viridis

  zonal-statistics:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.zonal_statistics.ZonalStatisticsProcessor

  aggregation:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.aggregation.AggregationProcessor

  era5-land-download:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.era5_land.ERA5LandProcessor

  chirps3-download:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.chirps3.CHIRPS3Processor

  chirps3-dhis2-workflow:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.chirps3_workflow.Chirps3WorkflowProcessor

  worldpop-dhis2-workflow:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.worldpop_dhis2_workflow.WorldPopDhis2WorkflowProcessor

  generic-dhis2-workflow:
    type: process
    processor:
      name: eo_api.routers.ogcapi.plugins.processes.generic_dhis2_workflow.GenericDhis2WorkflowProcessor
